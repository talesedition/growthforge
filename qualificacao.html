<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forje Prime | Pré-Qualificação</title>
    <meta name="theme-color" content="#0A0A0A">
    <meta name="description" content="Pré-qualificação para novos clientes Forje Prime - Gestão de Tráfego e Design">

    <link rel="icon" type="image/png" href="img/logo_forge_prime.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root{--ouro-forjado:#C9A961;--ouro-claro:#f4e5c2;--chama-viva:#FF4500;--brasa-profunda:#D4662C;--brasa-clara:#ff8c42;--carvao-ardente:#0A0A0A;--metal-escuro:#1a1a1a;--cinza-texto:#e0e0e0;--cinza-medio:#888;--erro:#ff4444}
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--brasa-profunda) var(--carvao-ardente)}
        body{font-family:'Montserrat',Arial,sans-serif;background:var(--carvao-ardente);color:var(--cinza-texto);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
        .header{background:rgba(10,10,10,.95);border-bottom:2px solid var(--ouro-forjado);padding:20px 0;text-align:center;position:relative;z-index:10;flex-shrink:0}
        .header::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--chama-viva),transparent)}
        .logo-container{display:flex;align-items:center;justify-content:center;gap:12px}
        .logo-img{height:40px;width:auto;display:block}
        .logo-text{font-family:'Cinzel',serif;font-weight:900;font-size:1.5rem;background:linear-gradient(135deg,var(--ouro-forjado),var(--brasa-clara));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
        .header-subtitle{color:var(--cinza-medio);font-size:.85rem;margin-top:8px;letter-spacing:1px}
        .chat-container{flex:1;max-width:800px;width:100%;margin:0 auto;padding:40px 20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;max-height:calc(100vh - 200px);scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--brasa-profunda) rgba(255,255,255,.03)}
        .chat-container::-webkit-scrollbar{width:6px}
        .chat-container::-webkit-scrollbar-track{background:rgba(255,255,255,.03);border-radius:3px;margin:4px 0}
        .chat-container::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--brasa-profunda),var(--ouro-forjado));border-radius:3px}
        .message{display:flex;align-items:flex-start;gap:12px;opacity:0;transform:translateY(20px);animation:fadeInUp .5s forwards;flex-shrink:0}
        .message.bot{align-self:flex-start}
        .message.user{align-self:flex-end;flex-direction:row-reverse}
        .message.error{align-self:flex-start;padding-left:48px}
        .message.error .message-bubble{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.4);color:#ff8888;font-size:.85rem;padding:10px 16px}
        .message-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .message.bot .message-avatar{background:linear-gradient(135deg,var(--brasa-profunda),var(--chama-viva));color:white}
        .message.bot .message-avatar svg{width:18px;height:18px}
        .message.user .message-avatar{background:linear-gradient(135deg,var(--ouro-forjado),var(--brasa-clara));color:var(--carvao-ardente)}
        .message.user .message-avatar svg{width:18px;height:18px}
        .message-bubble{max-width:70%;padding:15px 20px;border-radius:18px;font-size:.95rem;line-height:1.6;position:relative}
        .message.bot .message-bubble{background:rgba(255,255,255,.08);border:1px solid rgba(201,169,97,.3);color:var(--cinza-texto);border-bottom-left-radius:4px}
        .message.user .message-bubble{background:linear-gradient(135deg,var(--ouro-forjado),var(--brasa-profunda));color:white;border-bottom-right-radius:4px}
        .options-container{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;padding-left:48px;flex-shrink:0;animation:fadeInUp .3s forwards}
        .option-btn{background:linear-gradient(135deg,var(--brasa-profunda),var(--chama-viva));color:white;border:none;padding:12px 24px;border-radius:25px;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;font-size:.9rem;transition:all .3s;box-shadow:0 4px 15px rgba(212,102,44,.3)}
        .option-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,102,44,.5)}
        .input-container{display:none;align-items:center;gap:10px;margin-top:10px;padding-left:48px;animation:fadeInUp .3s forwards;flex-shrink:0}
        .input-field{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(201,169,97,.3);border-radius:25px;padding:12px 20px;color:white;font-family:'Montserrat',sans-serif;font-size:.95rem;outline:none;transition:all .3s}
        .input-field:focus{border-color:var(--ouro-forjado);box-shadow:0 0 10px rgba(201,169,97,.2)}
        .input-field::placeholder{color:var(--cinza-medio)}
        .input-field.erro{border-color:var(--erro);box-shadow:0 0 10px rgba(255,68,68,.2)}
        .send-btn{width:45px;height:45px;border-radius:50%;background:linear-gradient(135deg,var(--ouro-forjado),var(--brasa-clara));border:none;color:var(--carvao-ardente);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
        .send-btn:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(201,169,97,.4)}
        .progress-container{position:fixed;top:0;left:0;width:100%;height:3px;background:rgba(255,255,255,.1);z-index:1000}
        .progress-bar{height:100%;background:linear-gradient(90deg,var(--chama-viva),var(--ouro-forjado));width:0%;transition:width .5s}
        .typing-indicator{display:flex;gap:4px;padding:10px 15px}
        .typing-dot{width:8px;height:8px;background:var(--ouro-forjado);border-radius:50%;animation:typing 1.4s infinite}
        .typing-dot:nth-child(2){animation-delay:.2s}
        .typing-dot:nth-child(3){animation-delay:.4s}
        .final-screen{display:none;text-align:center;padding:60px 20px;animation:fadeInUp .8s forwards;flex:1;flex-direction:column;align-items:center;justify-content:center}
        .final-icon{font-size:4rem;margin-bottom:20px}
        .final-title{font-family:'Cinzel',serif;font-size:2rem;color:var(--ouro-forjado);margin-bottom:15px}
        .final-text{color:var(--cinza-medio);margin-bottom:30px;line-height:1.7;max-width:600px}
        .whatsapp-final-btn{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#25D366,#128C7E);color:white;padding:18px 40px;border-radius:50px;text-decoration:none;font-weight:700;font-size:1.1rem;transition:all .3s;box-shadow:0 10px 30px rgba(37,211,102,.3);border:none;cursor:pointer;font-family:'Montserrat',sans-serif}
        .whatsapp-final-btn:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(37,211,102,.5)}
        .whatsapp-final-btn svg{width:24px;height:24px}
        .footer{text-align:center;padding:20px;border-top:1px solid rgba(201,169,97,.1);color:var(--cinza-medio);font-size:.8rem;flex-shrink:0}
        .footer-brand{font-family:'Cinzel',serif;color:var(--ouro-forjado);margin-bottom:5px}
        @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-10px)}}
        @media(max-width:768px){.chat-container{padding:20px 15px;max-height:calc(100vh - 180px)}.message-bubble{max-width:85%;padding:12px 16px;font-size:.9rem}.options-container,.input-container{padding-left:0}.option-btn{padding:10px 18px;font-size:.85rem}.final-title{font-size:1.5rem}}
        @media (prefers-reduced-motion: reduce) {*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
    </style>
